<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Burger Rústico</title>
<meta name="theme-color" content="#1C1208">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Lato', sans-serif;
    background: #1C1208;
    color: #F5E6C8;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Textura de madeira */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      repeating-linear-gradient(
        92deg,
        transparent,
        transparent 2px,
        rgba(139,94,60,0.03) 2px,
        rgba(139,94,60,0.03) 4px
      ),
      repeating-linear-gradient(
        180deg,
        transparent,
        transparent 40px,
        rgba(0,0,0,0.08) 40px,
        rgba(0,0,0,0.08) 41px
      );
    pointer-events: none;
  }

  .container {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 32px 24px; gap: 48px;
  }

  /* HERO */
  .hero { text-align: center; animation: fadeDown 0.9s ease; }

  .flame { font-size: 3.5rem; display: block; margin-bottom: 12px; animation: flicker 2s ease-in-out infinite; }
  @keyframes flicker { 0%,100%{transform:scale(1) rotate(-2deg)} 50%{transform:scale(1.08) rotate(2deg)} }

  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: 3rem; font-weight: 800;
    line-height: 1.1; letter-spacing: -0.02em;
  }
  .hero h1 em { color: #D4A017; font-style: italic; }

  .hero-divider {
    width: 80px; height: 2px;
    background: linear-gradient(90deg, transparent, #D4A017, transparent);
    margin: 16px auto;
  }
  .hero p { color: #A0845C; font-size: 0.95rem; letter-spacing: 0.05em; text-transform: uppercase; }

  /* CARDS */
  .cards { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 400px; animation: fadeUp 0.9s ease 0.2s both; }

  .card {
    border-radius: 18px; padding: 22px 24px;
    cursor: pointer; text-decoration: none; color: inherit;
    display: flex; align-items: center; gap: 18px;
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    position: relative; overflow: hidden;
  }
  .card-cliente {
    background: linear-gradient(135deg, #2A1A08, #3D2510);
    border: 1px solid #5C3D1E;
  }
  .card-painel {
    background: linear-gradient(135deg, #1A1A0A, #2A2A10);
    border: 1px solid #4A4A20;
  }
  .card:hover { transform: translateY(-4px) scale(1.02); }
  .card-cliente:hover { box-shadow: 0 12px 40px rgba(212,160,23,0.25); border-color: #D4A017; }
  .card-painel:hover { box-shadow: 0 12px 40px rgba(139,94,60,0.2); border-color: #8B5E3C; }

  .card-icon {
    width: 54px; height: 54px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.7rem; flex-shrink: 0;
  }
  .card-cliente .card-icon { background: rgba(212,160,23,0.15); }
  .card-painel .card-icon { background: rgba(139,94,60,0.15); }

  .card-text { flex: 1; }
  .card-title { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 1.1rem; margin-bottom: 3px; }
  .card-desc { color: #A0845C; font-size: 0.8rem; line-height: 1.4; }
  .card-arrow { color: #5C3D1E; font-size: 1.3rem; transition: all 0.3s; }
  .card:hover .card-arrow { color: #D4A017; transform: translateX(4px); }

  .footer { color: #4A3020; font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase; animation: fadeUp 0.9s ease 0.4s both; }

  @keyframes fadeDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <span class="flame">🔥</span>
    <h1>Burger<br><em>Rústico</em></h1>
    <div class="hero-divider"></div>
    <p>Artesanal & Irresistível</p>
  </div>

  <div class="cards">
    <a href="cliente.html" class="card card-cliente">
      <div class="card-icon">🍔</div>
      <div class="card-text">
        <div class="card-title">Fazer Pedido</div>
        <div class="card-desc">Ver cardápio e pedir agora</div>
      </div>
      <div class="card-arrow">›</div>
    </a>

    <a href="painel.html" class="card card-painel">
      <div class="card-icon">📋</div>
      <div class="card-text">
        <div class="card-title">Painel da Loja</div>
        <div class="card-desc">Gerenciar pedidos em tempo real</div>
      </div>
      <div class="card-arrow">›</div>
    </a>
  </div>

  <p class="footer">Burger Rústico © 2025</p>
</div>
</body>
</html>
